aid: excalidraw
url: https://raw.githubusercontent.com/api-evangelist/excalidraw/refs/heads/main/apis.yml
name: Excalidraw
kind: opensource
description: >-
  Excalidraw is an MIT-licensed virtual whiteboard with a hand-drawn aesthetic. Primary
  surfaces are the hosted web app at excalidraw.com and the @excalidraw/excalidraw npm
  package for embedding the canvas in other apps. There is no public REST API.
  Excalidraw+ is the commercial managed offering.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Collaboration
  - Whiteboard
  - Diagramming
  - Open Source
  - Drawing
created: '2026-05-08'
modified: '2026-05-08'
specificationVersion: '0.19'
apis:
  - aid: excalidraw:excalidraw-npm-package
    name: '@excalidraw/excalidraw npm Package'
    humanURL: https://docs.excalidraw.com/
    baseURL: npm package (no network endpoint)
    tags:
      - SDK
      - React
      - Library
    description: >-
      The official React component package for embedding the Excalidraw canvas. Provides
      programmatic control over scene state, libraries, and serialized JSON. There is no
      Excalidraw REST API; integrations are component-level.
